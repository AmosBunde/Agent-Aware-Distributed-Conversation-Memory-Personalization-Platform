apiVersion: v1
kind: Secret
metadata:
  name: {{ include "conv-memory.fullname" . }}-secrets
  labels:
    {{- include "conv-memory.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "postgres.password is required" .Values.postgres.password | quote }}
  GATEWAY_API_KEY: {{ .Values.auth.gatewayApiKey | quote }}
  JWT_SECRET: {{ .Values.auth.jwtSecret | quote }}
  OPENAI_API_KEY: {{ .Values.openaiApiKey | quote }}
