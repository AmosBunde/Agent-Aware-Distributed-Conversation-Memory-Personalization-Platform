{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "conv-memory.fullname" . }}-gateway
  labels:
    {{- include "conv-memory.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # Only the gateway is ever exposed; internal services stay ClusterIP
                name: {{ include "conv-memory.fullname" . }}-gateway
                port:
                  number: {{ (get .Values.services "gateway").port }}
{{- end }}
