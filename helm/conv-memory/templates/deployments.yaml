{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "conv-memory.fullname" $root }}-{{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "conv-memory.labels" $root | nindent 4 }}
spec:
  replicas: {{ $root.Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        {{- include "conv-memory.labels" $root | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $svc.port | quote }}
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $root.Values.image.repository }}-{{ $name }}:{{ $root.Values.image.tag }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          envFrom:
            - configMapRef:
                name: {{ include "conv-memory.fullname" $root }}-config
            - secretRef:
                name: {{ include "conv-memory.fullname" $root }}-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ $svc.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ $svc.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml $root.Values.resources | nindent 12 }}
{{- end }}
