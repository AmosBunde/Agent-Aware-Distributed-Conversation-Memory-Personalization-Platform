name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-unit:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install toolchain
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Unit tests with coverage
        run: pytest --cov=shared --cov=services --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  e2e:
    name: Compose e2e smoke
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install httpx pytest pytest-asyncio redis asyncpg

      - name: Boot the stack
        run: |
          cp .env.example .env
          docker compose up --build -d

      - name: Wait for gateway health
        run: |
          for i in $(seq 1 60); do
            status=$(curl -s http://localhost:8000/healthz | python3 -c 'import sys,json;print(json.load(sys.stdin)["status"])' 2>/dev/null || echo "starting")
            [ "$status" = "ok" ] && exit 0
            sleep 2
          done
          echo "stack did not become healthy in time"
          docker compose ps
          docker compose logs --tail=50
          exit 1

      - name: Run integration + e2e suites
        run: pytest tests/integration tests/e2e -q

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v
