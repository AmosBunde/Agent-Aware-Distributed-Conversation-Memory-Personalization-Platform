# Full local stack. Service entries are added incrementally as each service
# lands (see issues #2–#6); infrastructure lives here from the start.
name: conv-memory-platform

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-convmem}
      POSTGRES_USER: ${POSTGRES_USER:-convmem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-convmem-dev-password}
    ports:
      # Loopback-only: dev conveniences must not be reachable from the network
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/initdb.sql:/docker-entrypoint-initdb.d/initdb.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  embedding:
    build:
      context: .
      dockerfile: services/embedding/Dockerfile
    environment:
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-local}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "127.0.0.1:${EMBEDDING_HOST_PORT:-8003}:8003"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8003/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  memory:
    build:
      context: .
      dockerfile: services/memory/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-convmem}
      POSTGRES_USER: ${POSTGRES_USER:-convmem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-convmem-dev-password}
      EMBEDDING_SERVICE_URL: http://embedding:8003
    ports:
      - "127.0.0.1:${MEMORY_HOST_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8001/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  session:
    build:
      context: .
      dockerfile: services/session/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-1800}
    ports:
      - "127.0.0.1:${SESSION_HOST_PORT:-8004}:8004"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8004/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  personalization:
    build:
      context: .
      dockerfile: services/personalization/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-convmem}
      POSTGRES_USER: ${POSTGRES_USER:-convmem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-convmem-dev-password}
      MEMORY_SERVICE_URL: http://memory:8001
    ports:
      - "127.0.0.1:${PERSONALIZATION_HOST_PORT:-8002}:8002"
    depends_on:
      postgres:
        condition: service_healthy
      memory:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8002/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      MEMORY_SERVICE_URL: http://memory:8001
      PERSONALIZATION_SERVICE_URL: http://personalization:8002
      EMBEDDING_SERVICE_URL: http://embedding:8003
      SESSION_SERVICE_URL: http://session:8004
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-40}
      CIRCUIT_FAILURE_THRESHOLD: ${CIRCUIT_FAILURE_THRESHOLD:-5}
      CIRCUIT_RESET_SECONDS: ${CIRCUIT_RESET_SECONDS:-30}
    ports:
      # The one public door: web console + all APIs
      - "127.0.0.1:${GATEWAY_HOST_PORT:-8000}:8000"
    depends_on:
      memory:
        condition: service_healthy
      session:
        condition: service_healthy
      personalization:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
