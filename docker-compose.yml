# Full local stack. Service entries are added incrementally as each service
# lands (see issues #2–#6); infrastructure lives here from the start.
name: conv-memory-platform

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-convmem}
      POSTGRES_USER: ${POSTGRES_USER:-convmem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-convmem-dev-password}
    ports:
      # Loopback-only: dev conveniences must not be reachable from the network
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  embedding:
    build:
      context: .
      dockerfile: services/embedding/Dockerfile
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-local}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "127.0.0.1:${EMBEDDING_HOST_PORT:-8003}:8003"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8003/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  memory:
    build:
      context: .
      dockerfile: services/memory/Dockerfile
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-convmem}
      POSTGRES_USER: ${POSTGRES_USER:-convmem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-convmem-dev-password}
      EMBEDDING_SERVICE_URL: http://embedding:8003
      REDIS_URL: redis://redis:6379/0
      EVENT_BUS: ${EVENT_BUS:-redis}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    ports:
      - "127.0.0.1:${MEMORY_HOST_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8001/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  session:
    build:
      context: .
      dockerfile: services/session/Dockerfile
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      REDIS_URL: redis://redis:6379/0
      EVENT_BUS: ${EVENT_BUS:-redis}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-1800}
      MEMORY_SERVICE_URL: http://memory:8001
    ports:
      - "127.0.0.1:${SESSION_HOST_PORT:-8004}:8004"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8004/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  personalization:
    build:
      context: .
      dockerfile: services/personalization/Dockerfile
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-convmem}
      POSTGRES_USER: ${POSTGRES_USER:-convmem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-convmem-dev-password}
      MEMORY_SERVICE_URL: http://memory:8001
    ports:
      - "127.0.0.1:${PERSONALIZATION_HOST_PORT:-8002}:8002"
    depends_on:
      postgres:
        condition: service_healthy
      memory:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8002/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      MEMORY_SERVICE_URL: http://memory:8001
      PERSONALIZATION_SERVICE_URL: http://personalization:8002
      EMBEDDING_SERVICE_URL: http://embedding:8003
      SESSION_SERVICE_URL: http://session:8004
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_JWKS_URL: ${JWT_JWKS_URL:-}
      JWT_ISSUER: ${JWT_ISSUER:-}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-40}
      CIRCUIT_FAILURE_THRESHOLD: ${CIRCUIT_FAILURE_THRESHOLD:-5}
      CIRCUIT_RESET_SECONDS: ${CIRCUIT_RESET_SECONDS:-30}
    ports:
      # The one public door: web console + all APIs
      - "127.0.0.1:${GATEWAY_HOST_PORT:-8000}:8000"
    depends_on:
      memory:
        condition: service_healthy
      session:
        condition: service_healthy
      personalization:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── kafka profile: docker compose --profile kafka up (set EVENT_BUS=kafka) ──
  kafka:
    image: apache/kafka:3.7.1
    profiles: ["kafka"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── observability profile: docker compose --profile observability up ──
  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: ["observability"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:11.1.0
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3001}:3000"
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.57
    profiles: ["observability"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:${JAEGER_HOST_PORT:-16686}:16686"

volumes:
  pgdata:
